experiment:
  name: dann_3to2_gap
  task: CWRU cross-load domain adaptation with gap split
  source_load_hp: 3
  target_load_hp: 2
  model: DANN
  num_classes: 10

data:
  processed_npz: data/processed/cwru_12k_de_windows.npz
  split_npz: data/processed/cwru_12k_de_splits_3to2_gap.npz
  source_train_split: train_source_indices
  source_val_split: val_source_indices
  target_train_split: train_target_unlabeled_indices
  target_test_split: test_target_indices

training:
  batch_size: 64
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0001
  grl_lambda: 1.0
  domain_loss_weight: 1.0
  seed: 42
  use_class_weight: true

outputs:
  experiment_dir: outputs/experiments/dann_3to2_gap
  checkpoint: outputs/experiments/dann_3to2_gap/checkpoints/dann_best.pt
  final_checkpoint: outputs/experiments/dann_3to2_gap/checkpoints/dann_final.pt
  train_log: outputs/experiments/dann_3to2_gap/logs/train_log.csv

status:
  use_as_main_result: false
  note: Exploratory reliability check only. Not used as main project conclusion.
