experiment:
  name: dann_3to2
  task: CWRU cross-load domain adaptation
  source_load_hp: 3
  target_load_hp: 2
  model: DANN
  num_classes: 10

data:
  processed_npz: data/processed/cwru_12k_de_windows.npz
  split_npz: data/processed/cwru_12k_de_splits_3to2.npz
  source_train_split: train_source_indices
  source_val_split: val_source_indices
  target_train_split: train_target_unlabeled_indices
  target_test_split: test_target_indices

training:
  batch_size: 64
  epochs: 20
  learning_rate: 0.001
  weight_decay: 0.0001
  grl_lambda: 1.0
  domain_loss_weight: 1.0
  seed: 42
  use_class_weight: true

outputs:
  experiment_dir: outputs/experiments/dann_3to2
  checkpoint: outputs/experiments/dann_3to2/checkpoints/dann_best.pt
  final_checkpoint: outputs/experiments/dann_3to2/checkpoints/dann_final.pt
  train_log: outputs/experiments/dann_3to2/logs/train_log.csv

results:
  best_checkpoint:
    target_test_accuracy: 0.889968
    target_test_macro_f1: 0.831587
  final_checkpoint:
    target_test_accuracy: 0.864078
    target_test_macro_f1: 0.820324
  improvement_over_cnn1d:
    macro_f1_absolute_gain: 0.145565
  hard_classes:
    - class_name: IR014
      f1: 0.121951
      most_confused_with: IR007
    - class_name: B021
      f1: 0.789916
      most_confused_with: B007
